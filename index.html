<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema da Isabela</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .desc {
      color: #999;
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #2d2d2d;
    }

    .card p {
      color: #aaa;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 30px;
    }

    .form-box {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 20px;
      border: 1px solid #2d2d2d;
      margin-bottom: 30px;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    input,
    select {
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 14px;
      border-radius: 12px;
      outline: none;
    }

    button {
      margin-top: 20px;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 14px 25px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #6d28d9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
    }

    th {
      background: #222;
      padding: 15px;
      text-align: left;
    }

    td {
      padding: 15px;
      border-top: 1px solid #2d2d2d;
    }

    .status {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .pendente {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .pago {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .atrasado {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .delete {
      background: #dc3545;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .delete:hover {
      background: #b02a37;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fade 0.2s ease;
    }

    .popup-box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #333;
      text-align: center;
      animation: subir 0.25s ease;
    }

    .popup-box h2 {
      margin-bottom: 10px;
      color: #fff;
    }

    .popup-box p {
      color: #aaa;
      margin-bottom: 25px;
    }

    .popup-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .cancelar {
      background: #333;
    }

    .cancelar:hover {
      background: #444;
    }

    .confirmar {
      background: #7c3aed;
    }

    .confirmar:hover {
      background: #6d28d9;
    }

    @keyframes fade {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes subir {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style></head>
<body>  <div class="container">
    <h1>Sistema da Isabela 💜</h1>
    <p class="desc">Controle de dinheiro emprestado usando bancos e cartões.</p><div class="cards">
  <div class="card">
    <p>Total emprestado</p>
    <h2 id="totalEmprestado">R$ 0,00</h2>
  </div>

  <div class="card">
    <p>Total com juros</p>
    <h2 id="totalJuros">R$ 0,00</h2>
  </div>

  <div class="card">
    <p>Pessoas cadastradas</p>
    <h2 id="quantidade">0</h2>
  </div>
</div>

<div class="form-box">
  <h2>Novo empréstimo</h2>

  <div class="inputs">
    <input type="text" id="banco" placeholder="Banco ou cartão usado">

    <input type="text" id="pessoa" placeholder="Nome da pessoa">

    <input type="number" id="valor" placeholder="Valor emprestado">

    <input type="number" id="juros" placeholder="Juros (%)">

    <input type="date" id="data">

    <select id="status">
      <option>Pendente</option>
      <option>Pago</option>
      
    </select>
  </div>

  <button onclick="adicionarEmprestimo()">Adicionar empréstimo</button>
</div>

<table>
  <thead>
    <tr>
      <th>Banco</th>
      <th>Pessoa</th>
      <th>Valor</th>
      <th>Total c/ Juros</th>
      <th>Juros</th>
      <th>Data</th>
      <th>Status</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody id="tabelaEmprestimos">
  </tbody>
</table>

  </div>  <script>
    let emprestimos = JSON.parse(localStorage.getItem('emprestimosIsabela')) || [];

    atualizarTabela();
    atualizarCards();

    function salvarDados() {
      localStorage.setItem('emprestimosIsabela', JSON.stringify(emprestimos));
    }

    function adicionarEmprestimo() {
      const banco = document.getElementById('banco').value;
      const pessoa = document.getElementById('pessoa').value;
      const valor = parseFloat(document.getElementById('valor').value);
      const juros = parseFloat(document.getElementById('juros').value) || 0;
      const data = document.getElementById('data').value;
      const status = document.getElementById('status').value;

      if (!banco || !pessoa || !valor) {
        alert('Preencha os campos obrigatórios!');
        return;
      }

      const emprestimo = {
        id: Date.now(),
        banco,
        pessoa,
        valor,
        juros,
        data,
        status
      };

      emprestimos.unshift(emprestimo);

      salvarDados();

      atualizarTabela();
      atualizarCards();

      document.getElementById('banco').value = '';
      document.getElementById('pessoa').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('juros').value = '';
      document.getElementById('data').value = '';
    }

    function atualizarTabela() {
      const tabela = document.getElementById('tabelaEmprestimos');
      tabela.innerHTML = '';

      emprestimos.forEach(emp => {
        let classe = 'pendente';

        if (emp.status === 'Pago') {
          classe = 'pago';
        }

        tabela.innerHTML += `
          <tr>
            <td>${emp.banco}</td>
            <td>${emp.pessoa}</td>
            <td>R$ ${emp.valor.toFixed(2)}</td>
            <td>
              R$ ${(emp.valor + (emp.valor * emp.juros / 100)).toFixed(2)}
            </td>
            <td>${emp.juros}%</td>
            <td>${emp.data || '---'}</td>

            <td>
              <select onchange="alterarStatus(${emp.id}, this.value)" class="status ${classe}">
                <option value="Pendente" ${emp.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
                <option value="Pago">Pago</option>
              </select>
            </td>

            <td>
              <button class="delete" onclick="remover(${emp.id})">
                Excluir
              </button>
            </td>
          </tr>
        `;
      });
    }

    function atualizarCards() {
      const total = emprestimos.reduce((acc, emp) => acc + emp.valor, 0);

      const totalComJuros = emprestimos.reduce((acc, emp) => {
        return acc + (emp.valor + (emp.valor * emp.juros / 100));
      }, 0);

      document.getElementById('totalEmprestado').innerText = `R$ ${total.toFixed(2)}`;
      document.getElementById('totalJuros').innerText = `R$ ${totalComJuros.toFixed(2)}`;
      document.getElementById('quantidade').innerText = emprestimos.length;
    }

    function alterarStatus(id, novoStatus) {
      if (novoStatus === 'Pago') {
        abrirPopup(id);
      }
    }

    function abrirPopup(id) {
      const popup = document.createElement('div');
      popup.id = 'popupConfirmacao';

      popup.innerHTML = `
        <div class="popup-overlay">
          <div class="popup-box">
            <h2>Empréstimo pago 💸</h2>
            <p>Deseja remover este empréstimo da lista?</p>

            <div class="popup-buttons">
              <button class="cancelar" onclick="fecharPopup()">
                Cancelar
              </button>

              <button class="confirmar" onclick="confirmarRemocao(${id})">
                Confirmar
              </button>
            </div>
          </div>
        </div>
      `;

      document.body.appendChild(popup);
    }

    function fecharPopup() {
      const popup = document.getElementById('popupConfirmacao');

      if (popup) {
        popup.remove();
      }
    }

    function confirmarRemocao(id) {
      emprestimos = emprestimos.filter(emp => emp.id !== id);

      salvarDados();

      atualizarTabela();
      atualizarCards();

      fecharPopup();
    }

    function remover(id) {
      emprestimos = emprestimos.filter(emp => emp.id !== id);

      salvarDados();

      atualizarTabela();
      atualizarCards();
    }
  </script></body>
      </html>
